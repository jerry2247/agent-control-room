# Render Blueprint (Infrastructure-as-Code). Sponsor: Render.
# Deploy: push this repo to GitHub -> Render Dashboard -> New -> Blueprint.
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: orthogonal-search-harness
    runtime: python
    plan: starter            # bump to "standard" if running CLICKHOUSE_MODE=chdb in-process
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      # ---- Tier 0 works with no keys at all (mock/local/chdb). ----
      # Flip each sponsor on by filling these in the Render dashboard:
      - key: COMPOSIO_API_KEY          # SEARCH_BACKEND auto-switches to composio
        sync: false
      - key: TRUEFOUNDRY_BASE_URL      # LLM via TrueFoundry AI Gateway
        sync: false
      - key: TRUEFOUNDRY_API_KEY
        sync: false
      - key: TRUEFOUNDRY_CHAT_MODEL
        sync: false
      - key: ANTHROPIC_API_KEY         # or direct Anthropic instead of the gateway
        sync: false
      - key: CLICKHOUSE_HOST           # ClickHouse Cloud (recommended in production)
        sync: false
      - key: CLICKHOUSE_PASSWORD
        sync: false
      - key: CLICKHOUSE_USER
        value: default
      - key: CLICKHOUSE_MODE
        value: auto                    # set to "cloud" once CLICKHOUSE_HOST is set
      - key: AIRBYTE_CLIENT_ID
        sync: false
      - key: AIRBYTE_CLIENT_SECRET
        sync: false
      - key: AIRBYTE_CONNECTION_ID
        sync: false
      - key: ETL_BACKEND
        value: inline                  # set to "airbyte" once the connection exists
